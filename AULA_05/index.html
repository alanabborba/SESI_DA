<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pet Shop</title>

    <link rel="stylesheet" href="style.css">

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <!-- Lado esquerdo -->
    <div class="left">

        <h1>Bem-Vindo</h1>

        <img src="img/cachorro.jpg" alt="Cachorro">

    </div>

    <!-- Lado direito -->
    <div class="right">

        <h2>
            Encontre tudo o que você precisa
            para seu animal de estimação
        </h2>

        <div class="buttons">

            <button>
                <img src="img/google.png">
                Entrar com Google
            </button>

            <button>
                <img src="img/apple.png">
                Entrar com Apple
            </button>

            <button>
                <img src="img/email.png">
                Entrar com E-mail
            </button>

        </div>

        <p>
            Você quer tentar de outra maneira?
            <a href="#">Saber mais</a>
        </p>

        <button class="continuar">
            Vamos lá
        </button>

    </div>

</div>
